<h1>Traffic Congestion Map</h1>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([19.0760,72.8777],11);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

L.marker([19.0760,72.8777])
.addTo(map)
.bindPopup("Mumbai - 85% Congestion");

L.marker([19.2183,72.9781])
.addTo(map)
.bindPopup("Thane - 65% Congestion");

L.marker([18.5204,73.8567])
.addTo(map)
.bindPopup("Pune - 45% Congestion");

</script>
